<!doctype html>
<html lang="ru">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Реестр сотрудников{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', path='css/tailwind.css') }}">
    <link rel="stylesheet" href="{{ url_for('static', path='css/app.css') }}">
</head>
<body class="min-h-screen bg-slate-100 text-ink antialiased">
    
    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
        {% block content %}{% endblock %}
    </main>

    <script src="{{ url_for('static', path='js/icons.js') }}"></script>
    <script src="{{ url_for('static', path='js/employees.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>
</html>
